# ============================================================
# Quid App - PostgreSQL local migration stack
# ============================================================
# Use this file together with docker-compose.yml when testing
# the SQLite -> PostgreSQL migration locally.
#
# Example:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d postgres
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: quid-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quid}
      POSTGRES_USER: ${POSTGRES_USER:-quid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quid-local-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - quid-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quid} -d ${POSTGRES_DB:-quid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  quid-postgres-data:
