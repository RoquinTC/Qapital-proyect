# ============================================================
# Quid App - Ollama Local AI Stack
# ============================================================
# Usa este archivo para levantar el motor de IA localmente.
#
# Comando para iniciar:
#   docker compose -f docker-compose.ollama.yml up -d
#
# Comandos para descargar modelos:
#   docker exec -it quid-ollama ollama pull llama3.2
#   docker exec -it quid-ollama ollama pull hermes3:8b
# ============================================================

services:
  ollama:
    image: ollama/ollama:latest
    container_name: quid-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
